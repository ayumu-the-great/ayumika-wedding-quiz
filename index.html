<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>プロフィールブッククイズ 回答フォーム</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Zen Maru Gothic",sans-serif;

    background:
    linear-gradient(180deg,#b7ecff 0%,#dff8ff 40%,#fffef9 100%);

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:20px;

}

.card{

    width:100%;
    max-width:420px;

    background:white;

    border-radius:24px;

    padding:40px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.15);

    text-align:center;

}

.icon{

    font-size:60px;
    margin-bottom:15px;

}

h1{

    color:#1487c9;
    margin-bottom:10px;

}

p{

    color:#666;
    line-height:1.8;

}

input{

    width:100%;

    margin-top:30px;

    padding:16px;

    font-size:18px;

    border-radius:12px;

    border:2px solid #ccefff;

    outline:none;

}

input:focus{

    border-color:#3bb9ff;

}

button{

    width:100%;

    margin-top:20px;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#18b6b2;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.25s;

}

button:hover{

    transform:translateY(-2px);

    background:#11a29f;

}

#result{

    margin-top:28px;

    min-height:120px;

    font-size:22px;

    font-weight:bold;

}

.correct{

    color:#16a34a;

}

.wrong{

    color:#e11d48;

}

.small{

    margin-top:12px;
    font-size:15px;
    font-weight:normal;
    color:#666;

}

</style>

</head>

<body>

<div class="card">


<h1>回答フォーム</h1>

<p>

答えを<br>

<strong>ひらがな</strong>で入力してね

</p>

<input
id="answer"
placeholder="ここに入力">

<button onclick="check()">

回答する

</button>

<div id="result"></div>

</div>

<script>

function normalize(str){

return str
.replace(/\s/g,"")
.replace(/[ァ-ヶ]/g,function(s){
return String.fromCharCode(s.charCodeAt(0)-0x60);
});

}

function check(){

const answer = normalize(
document.getElementById("answer").value
);

const result = document.getElementById("result");

const ok = [

"おきなわけん",

];

if(ok.includes(answer)){

result.innerHTML=`

<div class="correct">

🎉 正解！ 🎉

</div>

<div class="small">

🌺🏝️イーヤーサーサー🏝️🌺

</div>

`;

}else{

result.innerHTML=`

<div class="wrong">

残念！

</div>

<div class="small">

もう一度考えてみてください😊

</div>

`;

}

}

</script>

</body>
</html>
